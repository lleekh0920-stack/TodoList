<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f4f6f8;
            color: #1f2937;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(760px, calc(100% - 32px));
            margin: 40px auto;
            background: #ffffff;
            border: 1px solid #d8dee6;
            border-radius: 8px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 28px;
        }

        form,
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            min-width: 0;
            height: 40px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 0 12px;
            font-size: 15px;
        }

        button {
            height: 40px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #ffffff;
            color: #1f2937;
            padding: 0 12px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #eef2f7;
        }

        .primary {
            border-color: #2563eb;
            background: #2563eb;
            color: #ffffff;
        }

        .primary:hover {
            background: #1d4ed8;
        }

        .active-filter {
            border-color: #2563eb;
            color: #2563eb;
            font-weight: 700;
        }

        #message {
            min-height: 24px;
            margin: 8px 0 12px;
            color: #dc2626;
            font-size: 14px;
        }

        #todo-list {
            list-style: none;
            margin: 20px 0 0;
            padding: 0;
        }

        .todo-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 14px 0;
            border-top: 1px solid #e5e7eb;
        }

        .todo-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .todo-title {
            overflow-wrap: anywhere;
            font-size: 16px;
        }

        .completed .todo-title {
            color: #6b7280;
            text-decoration: line-through;
        }

        .todo-meta {
            color: #6b7280;
            font-size: 12px;
        }

        .todo-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .empty {
            margin-top: 20px;
            padding: 20px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            color: #6b7280;
            text-align: center;
        }

        @media (max-width: 640px) {
            main {
                margin: 20px auto;
                padding: 18px;
            }

            form,
            .filters {
                flex-direction: column;
            }

            .todo-item {
                grid-template-columns: 1fr;
            }

            .todo-actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>Todo List</h1>

    <form id="todo-form">
        <input id="todo-input" type="text" placeholder="할 일을 입력하세요">
        <button class="primary" type="submit">추가</button>
    </form>

    <p id="message"></p>

    <div class="filters">
        <input id="search-input" type="text" placeholder="검색어를 입력하세요">
        <button id="search-button" type="button">검색</button>
        <button id="all-button" type="button">전체</button>
        <button id="active-button" type="button">미완료</button>
        <button id="completed-button" type="button">완료</button>
    </div>

    <ul id="todo-list"></ul>
</main>

<script>
    const message = document.getElementById("message");
    const form = document.getElementById("todo-form");
    const input = document.getElementById("todo-input");
    const todoList = document.getElementById("todo-list");
    const searchInput = document.getElementById("search-input");
    const searchButton = document.getElementById("search-button");
    const allButton = document.getElementById("all-button");
    const activeButton = document.getElementById("active-button");
    const completedButton = document.getElementById("completed-button");

    // null은 전체, false는 미완료, true는 완료 필터를 의미합니다.
    let currentCompleted = null;

    function showMessage(text) {
        message.textContent = text;
    }

    function clearMessage() {
        message.textContent = "";
    }

    function formatDate(dateText) {
        if (!dateText) {
            return "";
        }

        const date = new Date(dateText);

        if (Number.isNaN(date.getTime())) {
            return dateText;
        }

        return new Intl.DateTimeFormat("ko-KR", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        }).format(date);
    }

    async function getErrorMessage(response, fallbackMessage) {
        try {
            const error = await response.json();
            return error.message || error.error || fallbackMessage;
        } catch (e) {
            return fallbackMessage;
        }
    }

    function updateFilterButtons() {
        allButton.classList.toggle("active-filter", currentCompleted === null);
        activeButton.classList.toggle("active-filter", currentCompleted === false);
        completedButton.classList.toggle("active-filter", currentCompleted === true);
    }

    async function loadTodos() {
        const keyword = searchInput.value.trim();
        const params = new URLSearchParams();

        if (keyword) {
            params.append("keyword", keyword);
        }

        if (currentCompleted !== null) {
            params.append("completed", currentCompleted);
        }

        const queryString = params.toString();
        const url = queryString ? `/todos?${queryString}` : "/todos";

        // fetch는 우리가 만든 Spring Controller API를 호출합니다.
        const response = await fetch(url);

        if (!response.ok) {
            const errorMessage = await getErrorMessage(response, "Todo 목록 조회에 실패했습니다.");
            showMessage(errorMessage);
            return;
        }

        const todos = await response.json();
        todoList.innerHTML = "";
        updateFilterButtons();

        if (todos.length === 0) {
            const empty = document.createElement("li");
            empty.className = "empty";
            empty.textContent = "표시할 Todo가 없습니다.";
            todoList.appendChild(empty);
            return;
        }

        todos.forEach(todo => {
            const li = document.createElement("li");
            li.className = todo.completed ? "todo-item completed" : "todo-item";

            const contentBox = document.createElement("div");
            contentBox.className = "todo-content";

            const title = document.createElement("span");
            title.className = "todo-title";
            title.textContent = todo.completed ? `[완료] ${todo.content}` : todo.content;

            const meta = document.createElement("span");
            meta.className = "todo-meta";
            meta.textContent = `생성 ${formatDate(todo.createdAt)} / 수정 ${formatDate(todo.updatedAt)}`;

            contentBox.appendChild(title);
            contentBox.appendChild(meta);

            const actions = document.createElement("div");
            actions.className = "todo-actions";

            const toggleButton = document.createElement("button");
            toggleButton.textContent = todo.completed ? "미완료" : "완료";
            toggleButton.addEventListener("click", async () => {
                const response = await fetch(`/todos/${todo.id}/toggle`, {
                    method: "PATCH"
                });

                if (!response.ok) {
                    const errorMessage = await getErrorMessage(response, "완료 상태 변경에 실패했습니다.");
                    showMessage(errorMessage);
                    return;
                }

                clearMessage();
                loadTodos();
            });

            const updateButton = document.createElement("button");
            updateButton.textContent = "수정";
            updateButton.addEventListener("click", async () => {
                const newContent = prompt("수정할 내용을 입력하세요.", todo.content);

                if (newContent === null) {
                    return;
                }

                const content = newContent.trim();

                if (!content) {
                    showMessage("Todo 내용은 비어 있을 수 없습니다.");
                    return;
                }

                const response = await fetch(`/todos/${todo.id}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ content })
                });

                if (!response.ok) {
                    const errorMessage = await getErrorMessage(response, "Todo 수정에 실패했습니다.");
                    showMessage(errorMessage);
                    return;
                }

                clearMessage();
                loadTodos();
            });

            const deleteButton = document.createElement("button");
            deleteButton.textContent = "삭제";
            deleteButton.addEventListener("click", async () => {
                const response = await fetch(`/todos/${todo.id}`, {
                    method: "DELETE"
                });

                if (!response.ok) {
                    const errorMessage = await getErrorMessage(response, "Todo 삭제에 실패했습니다.");
                    showMessage(errorMessage);
                    return;
                }

                clearMessage();
                loadTodos();
            });

            actions.appendChild(toggleButton);
            actions.appendChild(updateButton);
            actions.appendChild(deleteButton);

            li.appendChild(contentBox);
            li.appendChild(actions);
            todoList.appendChild(li);
        });
    }

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const content = input.value.trim();

        if (!content) {
            showMessage("Todo 내용은 비어 있을 수 없습니다.");
            return;
        }

        const response = await fetch("/todos", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ content })
        });

        if (!response.ok) {
            const errorMessage = await getErrorMessage(response, "Todo 추가에 실패했습니다.");
            showMessage(errorMessage);
            return;
        }

        clearMessage();
        input.value = "";
        loadTodos();
    });

    searchButton.addEventListener("click", () => {
        loadTodos();
    });

    searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            loadTodos();
        }
    });

    allButton.addEventListener("click", () => {
        currentCompleted = null;
        loadTodos();
    });

    activeButton.addEventListener("click", () => {
        currentCompleted = false;
        loadTodos();
    });

    completedButton.addEventListener("click", () => {
        currentCompleted = true;
        loadTodos();
    });

    loadTodos();
</script>
</body>
</html>
